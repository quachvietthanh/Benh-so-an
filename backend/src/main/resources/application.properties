# ==========================================================
# Application
# ==========================================================

spring.application.name=benh-so-an

# Active profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# ==========================================================
# Server
# ==========================================================

server.port=8080
server.servlet.context-path=/api/v1

# ==========================================================
# MySQL Database
# ==========================================================

spring.datasource.url=jdbc:mysql://localhost:3306/digital_medical_record?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh

spring.datasource.username=root
spring.datasource.password=21082004
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================================
# JPA
# ==========================================================

# Dùng Flyway để quản lý schema nên KHÔNG để Hibernate tự tạo bảng
spring.jpa.hibernate.ddl-auto=none

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==========================================================
# Flyway
# ==========================================================

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# ==========================================================
# Upload
# ==========================================================

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ==========================================================
# Jackson
# ==========================================================

spring.jackson.time-zone=Asia/Ho_Chi_Minh
spring.jackson.serialization.write-dates-as-timestamps=false

# ==========================================================
# Encoding
# ==========================================================

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ==========================================================
# JWT
# ==========================================================

# 30 phút
app.jwt.expiration-ms=1800000

# ==========================================================
# Swagger
# ==========================================================

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# ==========================================================
# H2
# ==========================================================

spring.h2.console.enabled=false

# ==========================================================
# Logging
# ==========================================================

logging.level.root=INFO