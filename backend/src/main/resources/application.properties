# ==========================================
# Cấu hình chung - Bệnh số án
# ==========================================

spring.application.name=benh-so-an

# Active profile (ĐÃ TẮT PROFILE DEV)
# spring.profiles.active=dev

# Server
server.port=8080
server.servlet.context-path=/api/v1

# JPA
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
app.jwt.secret=benhsoan-secret-key-change-in-production-please
app.jwt.expiration-ms=86400000

# Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Logging
logging.level.com.benhsoan=DEBUG
logging.level.org.springframework.security=INFO

# H2
spring.h2.console.enabled=false

# ==========================================
# Cấu hình Database (Gom từ file dev sang)
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/digital_medical_record?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=21082004
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect