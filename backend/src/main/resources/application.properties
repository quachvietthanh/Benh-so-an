# ==========================================
# Cấu hình chung - Bệnh số án
# ==========================================

spring.application.name=benh-so-an

# ---- Active Profile ----
spring.profiles.active=dev

# ---- Server ----
server.port=8080
server.servlet.context-path=/api/v1

# ---- Database (Mặc định H2 cho dev) ----
spring.datasource.url=jdbc:h2:mem:benhsoandb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ---- H2 Console ----
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- Flyway ----
spring.flyway.enabled=false

# ---- JWT ----
app.jwt.secret=benhsoan-secret-key-change-in-production-please
app.jwt.expiration-ms=86400000

# ---- File Upload ----
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ---- Logging ----
logging.level.com.benhsoan=DEBUG
logging.level.org.springframework.security=INFO
