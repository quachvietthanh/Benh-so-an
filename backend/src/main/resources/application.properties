# ==========================================================
# Application
# ==========================================================

spring.application.name=benh-so-an

# ==========================================================
# Active profile (local | dev | prod)
# ==========================================================

spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# ==========================================================
# Server
# ==========================================================

server.port=8080
server.servlet.context-path=/api/v1

# ==========================================================
# Flyway
# ==========================================================

spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration

# ==========================================================
# Upload
# ==========================================================

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ==========================================================
# Jackson
# ==========================================================

spring.jackson.time-zone=Asia/Ho_Chi_Minh
spring.jackson.serialization.write-dates-as-timestamps=false

# ==========================================================
# Encoding
# ==========================================================

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ==========================================================
# Hibernate
# ==========================================================

spring.jpa.open-in-view=false

# ==========================================================
# JWT
# ==========================================================

# 30 phút
app.jwt.expiration-ms=1800000

# ==========================================================
# Swagger
# ==========================================================

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# ==========================================================
# H2
# ==========================================================

spring.h2.console.enabled=false

# ==========================================================
# Default Logging
# ==========================================================

logging.level.root=INFO

# ==========================================================
# Cấu hình Database (Mặc định)
# ==========================================================

spring.datasource.url=jdbc:mysql://localhost:3306/digital_medical_record?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=benhsoan
spring.datasource.password=21082004
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.initialization-fail-timeout=-1

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.connection.autocommit=true
spring.jpa.properties.hibernate.query.fail_on_pagination_over_collection_fetch=true
