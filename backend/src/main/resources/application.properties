# ==========================================================
# Application & Profile Settings
# ==========================================================
spring.application.name=benh-so-an

# Mặc định kích hoạt profile 'local' (sẽ nạp thêm application-local.properties)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# ==========================================================
# Server
# ==========================================================
server.port=8080
server.servlet.context-path=/api/v1

# ==========================================================
# Database Base Configuration
# ==========================================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Mặc định lấy từ biến môi trường hoặc profile con
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/digital_medical_record?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# ==========================================================
# JPA / Hibernate
# ==========================================================
# Dùng Flyway để quản lý schema nên KHÔNG để Hibernate tự tạo bảng
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ==========================================================
# Flyway Migration
# ==========================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# ==========================================================
# File Upload
# ==========================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ==========================================================
# Jackson / Date Formatter
# ==========================================================
spring.jackson.time-zone=Asia/Ho_Chi_Minh
spring.jackson.serialization.write-dates-as-timestamps=false

# ==========================================================
# Encoding
# ==========================================================
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ==========================================================
# JWT Configuration
# ==========================================================
# 30 phút
app.jwt.expiration-ms=1800000
app.jwt.secret=${JWT_SECRET:DEV_SECRET_CHANGE_ME_MUST_BE_32_CHARS_LONG_123}

# ==========================================================
# Swagger UI / API Docs
# ==========================================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# ==========================================================
# H2 Console & Logging
# ==========================================================
spring.h2.console.enabled=false
logging.level.root=INFO