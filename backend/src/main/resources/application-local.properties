# ==========================================================
# Local Environment
# ==========================================================

spring.datasource.url=jdbc:mysql://localhost:3306/digital_medical_record?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8

spring.datasource.username=root
spring.datasource.password=Tuan20122005@

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================================
# Hibernate
# ==========================================================

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================================
# SQL Logging
# ==========================================================

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ==========================================================
# Application Logging
# ==========================================================

logging.level.com.benhsoan=DEBUG
logging.level.org.springframework.security=DEBUG

# ==========================================================
# JWT
# ==========================================================

app.jwt.secret=LOCAL_SECRET_CHANGE_ME_1234567890

# ==========================================================
# Mail
# ==========================================================

spring.mail.host=smtp.gmail.com
spring.mail.port=587

spring.mail.username=

spring.mail.password=

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true